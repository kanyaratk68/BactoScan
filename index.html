<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BactoScan Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0;
            overflow: hidden; /* ป้องกันการเลื่อนหน้าจอเกินจำเป็น */
            
            /* ดึงภาพพื้นหลัง bg.jpg มาใช้ พร้อมใส่สีดำโปร่งแสง 75% ทับเพื่อให้ตัวหนังสือเด่น */
            background-image: linear-gradient(rgba(4, 11, 22, 0.75), rgba(4, 11, 22, 0.75)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
        }

        /* เอฟเฟกต์ปุ่ม Scroll Down */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .animate-bounce-slow {
            animation: bounce 3s infinite;
        }
    </style>
</head>
<body class="text-white flex flex-col h-screen">

    <nav class="flex justify-between items-center px-8 py-6 w-full absolute top-0 z-50">
        
        <div class="flex items-center gap-3">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            <span class="font-bold tracking-widest text-lg">BACTOSCAN</span>
        </div>

        <div class="hidden md:flex items-center text-sm font-medium tracking-wide">
            
            <a href="dashboard.html" class="bg-white text-slate-900 px-6 py-2.5 rounded-sm transition-colors hover:bg-slate-200 shadow-[0_0_15px_rgba(255,255,255,0.4)]">
                1. พาไปวิเคราะห์
            </a>
            
            <a href=https://www.rsu.ac.th/faculty/642fdb3f95407d59436cd4b6/courses?degreeId=642150d744a532fdf9e57c0c">
                2. เว็บไซต์คณะพยาบาลศาสตร์
            </a>
            
            <a href="#team-credits" class="px-6 py-2.5 text-slate-300 hover:text-white transition-colors">
                3. รายชื่อผู้จัดทำ
            </a>
            
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center relative z-10 pt-16">
        
        <div class="mb-6 drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]">
            <svg class="w-32 h-32 md:w-48 md:h-48 text-white opacity-90" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                <circle cx="12" cy="12" r="3"/>
                <circle cx="7" cy="10" r="1.5"/>
                <circle cx="17" cy="10" r="1.5"/>
                <circle cx="10" cy="16" r="1.5"/>
                <circle cx="14" cy="16" r="1.5"/>
            </svg>
        </div>

        <h1 class="text-5xl md:text-7xl font-extrabold tracking-[0.1em] text-center drop-shadow-lg leading-tight mb-6">
            BACTOSCAN
        </h1>

        <hr class="w-20 border-t-2 border-red-600 mb-6 opacity-80">

        <div id="team-credits" class="text-center">
            <p class="text-lg md:text-xl font-light tracking-wide text-slate-200">
                Created by <span class="font-semibold text-white">Faculty of Nursing, RSU</span>
            </p>
        </div>
    </main>

    <div class="relative z-20 pb-12 flex justify-center">
        <div class="w-12 h-12 rounded-full border border-slate-400 flex items-center justify-center text-slate-300 transition-all animate-bounce-slow">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </div>
    </div>

</body>
</html>
